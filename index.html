<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1a1a1a">
    <link rel="manifest" href="manifest.json">
    <title>PromptFlow AI</title>
    <style>
        :root {
            --bg: #f8f9fa;
            --card: #ffffff;
            --gold: #d4a853;
            --gold-light: #f0d78c;
            --black: #1a1a1a;
            --text: #1a1a1a;
            --text2: #6b7280;
            --border: #e5e7eb;
            --input-bg: #f3f4f6;
            --green: #10b981;
            --red: #ef4444;
        }
        *{margin:0;padding:0;box-sizing:border-box}
        body{
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }
        .app{max-width:520px;margin:auto;padding:16px 16px 90px}

        .card{
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 22px;
            margin-bottom: 14px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }

        .header{
            background: var(--black);
            border-radius: 20px;
            padding: 24px 20px;
            margin-bottom: 18px;
            color: #fff;
            position: relative;
            overflow: hidden;
        }
        .header::after{
            content: '';
            position: absolute;
            top: -30px;
            right: -20px;
            width: 100px;
            height: 100px;
            background: var(--gold);
            opacity: 0.15;
            border-radius: 50%;
        }
        .header h1{font-size:20px;font-weight:700;position:relative;z-index:1}
        .header .sub{font-size:12px;opacity:0.7;margin-top:4px;position:relative;z-index:1}
        .header .logout-btn{
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            padding: 8px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            position: relative;
            z-index: 1;
        }

        .gold-line{
            height: 3px;
            background: linear-gradient(90deg, var(--gold), var(--gold-light), var(--gold));
            border-radius: 2px;
            margin: 6px 0 16px;
        }

        .btn{
            width:100%;padding:14px;border:none;border-radius:14px;
            font-size:15px;font-weight:600;cursor:pointer;transition:all 0.2s;
        }
        .btn:active{transform:scale(0.97)}
        .btn-pri{background:var(--black);color:#fff}
        .btn-pri:hover{background:#333}
        .btn-gold{background:linear-gradient(135deg,var(--gold),#c9963e);color:#fff}
        .btn-gold:hover{opacity:0.9}
        .btn-green{background:var(--green);color:#fff}
        .btn-out{background:#fff;color:var(--black);border:2px solid var(--black);font-weight:600}
        .btn-red{background:#fff;color:var(--red);border:2px solid var(--red)}
        .btn:disabled{opacity:0.4;cursor:not-allowed}
        .btn-sm{width:auto;padding:8px 18px;font-size:13px;border-radius:10px}

        .input{
            width:100%;padding:14px;border:2px solid var(--border);
            border-radius:14px;font-size:15px;margin-bottom:10px;font-family:inherit;
            background:var(--input-bg);color:var(--text);transition:all 0.2s;
        }
        .input:focus{outline:none;border-color:var(--gold);background:#fff;box-shadow:0 0 0 4px rgba(212,168,83,0.08)}
        .input::placeholder{color:#9ca3af}
        textarea.input{min-height:100px;resize:vertical}
        select.input{background:var(--input-bg)}

        .tabs{display:flex;gap:6px;margin-bottom:18px;background:var(--card);padding:5px;border-radius:16px;border:1px solid var(--border)}
        .tab{
            flex:1;padding:11px;text-align:center;border-radius:12px;cursor:pointer;
            font-weight:600;font-size:14px;border:none;background:transparent;color:var(--text2);
        }
        .tab.active{background:var(--black);color:#fff}

        .progress{display:flex;gap:4px;margin-bottom:18px}
        .pdot{flex:1;height:4px;border-radius:2px;background:var(--border)}
        .pdot.done{background:var(--gold)}
        .pdot.active{background:var(--gold);animation:pulse 1s infinite}
        @keyframes pulse{50%{opacity:0.3}}

        .step-num{
            width:32px;height:32px;background:var(--black);color:#fff;
            border-radius:50%;display:inline-flex;align-items:center;
            justify-content:center;font-weight:700;font-size:14px;margin-right:10px;
        }

        .output-box{
            background:var(--input-bg);padding:18px;border-radius:14px;
            white-space:pre-wrap;max-height:400px;overflow-y:auto;
            font-size:14px;line-height:1.8;margin-top:12px;
            border:1px solid var(--border);
        }

        .badge{
            display:inline-block;padding:7px 16px;border-radius:20px;
            font-size:13px;font-weight:600;margin:3px;cursor:pointer;
            background:var(--input-bg);color:var(--text2);border:1px solid var(--border);
        }
        .badge:hover{border-color:var(--gold)}
        .badge.sel{background:var(--black);color:#fff;border-color:var(--black)}

        .stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}
        .stat{
            background:var(--card);border:1px solid var(--border);
            border-radius:16px;padding:18px;text-align:center;
        }
        .stat-val{font-size:30px;font-weight:700;color:var(--black)}
        .stat-lbl{font-size:11px;color:var(--text2);margin-top:4px;font-weight:600;text-transform:uppercase;letter-spacing:1px}

        .bottom-nav{
            position:fixed;bottom:12px;left:50%;transform:translateX(-50%);
            background:var(--card);display:flex;border:1px solid var(--border);
            border-radius:18px;padding:4px;z-index:100;width:calc(100% - 24px);
            max-width:500px;box-shadow:0 4px 20px rgba(0,0,0,0.08);
        }
        .nav-i{
            flex:1;text-align:center;padding:10px;cursor:pointer;
            border-radius:14px;font-size:12px;font-weight:600;color:var(--text2);
            border:none;background:none;
        }
        .nav-i.active{background:var(--black);color:#fff}

        .spinner{
            width:36px;height:36px;border:3px solid var(--border);
            border-top-color:var(--gold);border-radius:50%;
            animation:spin 0.7s linear infinite;margin:18px auto;
        }
        @keyframes spin{to{transform:rotate(360deg)}}

        .toast{
            position:fixed;bottom:90px;left:50%;transform:translateX(-50%);
            background:var(--black);color:#fff;padding:12px 24px;
            border-radius:25px;font-size:14px;font-weight:600;z-index:200;
            animation:slideUp 0.3s;
        }
        @keyframes slideUp{from{opacity:0;transform:translateX(-50%) translateY(15px)}}

        .hidden{display:none!important}
        .center{text-align:center}
        .mt1{margin-top:8px}.mt2{margin-top:16px}.mb1{margin-bottom:8px}
        .flex{display:flex;gap:8px}.flex-btwn{display:flex;justify-content:space-between;align-items:center}
        .label-text{font-weight:700;margin-bottom:6px;display:block;font-size:14px;color:var(--black)}
        .text2{color:var(--text2);font-size:13px}
        .logo-text{font-size:40px;margin-bottom:6px}
        .error-text{color:var(--red);text-align:center;font-size:13px;margin-top:8px}

        .auth-card{
            background:var(--card);border:1px solid var(--border);
            border-radius:20px;padding:28px 22px;box-shadow:0 2px 12px rgba(0,0,0,0.04);
        }
        .auth-card h2{font-size:22px;font-weight:700;margin-bottom:4px}
        .auth-link{color:var(--gold);font-weight:700;text-decoration:none}
    </style>
</head>
<body>
    <div class="app" id="app"></div>
    <nav class="bottom-nav hidden" id="nav">
        <button class="nav-i active" data-p="home">🏠 Home</button>
        <button class="nav-i" data-p="prompt">⚡ Prompt</button>
        <button class="nav-i" data-p="history">📋 History</button>
        <button class="nav-i" data-p="profile">👤 Profile</button>
    </nav>

    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

    <script>
        var FC={apiKey:"AIzaSyCVonj30X4c-WaMzqngv5EuKv3YtDzqrxk",authDomain:"promptflow-ai-7de15.firebaseapp.com",projectId:"promptflow-ai-7de15",storageBucket:"promptflow-ai-7de15.firebasestorage.app",messagingSenderId:"681657211558",appId:"1:681657211558:web:e25e5be6d347f3c1f2f267"};
        var GK="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";
        var GM="llama-3.3-70b-versatile";
        firebase.initializeApp(FC);
        var auth=firebase.auth(),db=firebase.firestore();
        var U=null,page='home';
        var flow={goal:'',cat:'',aud:'',tone:'Professional',extra:''};
        var reconfirmAnalysis='',reconfirmHistory=[],reconfirmStep=0;

        function R(){
            var a=document.getElementById('app'),n=document.getElementById('nav');
            if(!U){a.innerHTML=AuthUI();n.classList.add('hidden');}
            else{n.classList.remove('hidden');if(page==='home')a.innerHTML=HomeUI();else if(page==='prompt')a.innerHTML=PromptUI();else if(page==='history'){a.innerHTML=HistoryUI();loadHistory();}else if(page==='profile')a.innerHTML=ProfileUI();}
        }

        function AuthUI(){
            var h='<div class="center" style="padding:50px 0 24px"><div class="logo-text">🧠</div><h1 style="font-size:28px;font-weight:800;color:var(--black)">PromptFlow AI</h1><p class="text2" style="margin-top:6px">Smart Problem Detector + Reconfirmation</p></div><div class="gold-line"></div>';
            h+='<div class="auth-card" id="loginBox"><h2>Welcome Back</h2><p class="text2 mb1">Sign in to continue</p><input id="le" class="input" type="email" placeholder="Email address"><input id="lp" class="input" type="password" placeholder="Password"><button onclick="L()" class="btn btn-pri">Sign In</button><p class="center mt1 text2">New here? <a href="#" onclick="TA()" class="auth-link">Create Account</a></p></div>';
            h+='<div class="auth-card hidden" id="signupBox"><h2>Create Account</h2><p class="text2 mb1">Free forever, no limits</p><input id="sn" class="input" placeholder="Full Name"><input id="se" class="input" type="email" placeholder="Email"><input id="sp" class="input" type="password" placeholder="Password (6+ chars)"><button onclick="S()" class="btn btn-gold">Create Free Account</button><p class="center mt1 text2">Already registered? <a href="#" onclick="TA()" class="auth-link">Sign In</a></p></div>';
            h+='<p id="ae" class="error-text"></p>';
            return h;
        }
        function TA(){document.getElementById('loginBox').classList.toggle('hidden');document.getElementById('signupBox').classList.toggle('hidden');document.getElementById('ae').textContent='';}
        function L(){var e=document.getElementById('le').value,p=document.getElementById('lp').value;auth.signInWithEmailAndPassword(e,p).catch(function(x){E(x.message);});}
        function S(){var n=document.getElementById('sn').value,e=document.getElementById('se').value,p=document.getElementById('sp').value;if(!n||!e||!p){E('All fields required');return;}if(p.length<6){E('Password must be 6+ characters');return;}auth.createUserWithEmailAndPassword(e,p).then(function(r){return db.collection('users').doc(r.user.uid).set({uid:r.user.uid,email:e,name:n,role:'user',createdAt:new Date().toISOString(),promptsUsed:0});}).catch(function(x){E(x.message);});}
        function E(m){document.getElementById('ae').textContent=m;}

        function HomeUI(){
            var h='<div class="header"><div class="flex-btwn"><div><h1>Hello, '+(U.displayName||U.email.split('@')[0]||'User')+' 👋</h1><p class="sub">Your Personal AI Advisor</p></div><button class="logout-btn" onclick="auth.signOut()">Logout</button></div></div>';
            h+='<div class="stats"><div class="stat"><div class="stat-val">'+(U.promptsUsed||0)+'</div><div class="stat-lbl">Solved</div></div><div class="stat"><div class="stat-val">Free</div><div class="stat-lbl">Plan</div></div></div>';
            h+='<div class="card center"><div style="font-size:44px;margin-bottom:8px">🚀</div><h3 style="font-size:18px;margin-bottom:6px">Ready to solve problems?</h3><p class="text2 mb1">AI understands → Confirms → Delivers</p><button onclick="SP(\'prompt\')" class="btn btn-gold">Start Smart Flow</button></div>';
            return h;
        }

        function PromptUI(){
            var h='<h2 style="font-size:20px;font-weight:700;margin-bottom:14px;color:var(--black)">Smart Problem Detector</h2>';
            h+='<div class="tabs"><button class="tab active" onclick="ST(\'simple\')">⚡ Quick</button><button class="tab" onclick="ST(\'master\')">🔬 Master Flow</button></div>';
            h+='<div id="simplePanel"><div class="card"><textarea id="si" class="input" placeholder="Describe your problem in detail...&#10;&#10;e.g., My D2C brand sales dropped 40% in 3 months..."></textarea><button onclick="QS()" id="sB" class="btn btn-pri">Analyze & Generate</button><div id="sO" class="output-box hidden"></div></div></div>';
            h+='<div id="masterPanel" class="hidden">'+MS1()+'</div>';
            h+='<div id="loadD" class="center hidden"><div class="spinner"></div><p class="text2">Deep analysis in progress...</p></div>';
            return h;
        }
        function ST(t){
            var tabs=document.querySelectorAll('.tab');
            for(var i=0;i<tabs.length;i++){tabs[i].classList.remove('active');}
            event.target.classList.add('active');
            document.getElementById('simplePanel').classList.toggle('hidden',t!=='simple');
            document.getElementById('masterPanel').classList.toggle('hidden',t!=='master');
            reconfirmStep=0;reconfirmAnalysis='';reconfirmHistory=[];
        }

        async function QS(){
            var t=document.getElementById('si').value;if(!t)return;
            document.getElementById('sB').disabled=true;document.getElementById('loadD').classList.remove('hidden');
            var out=await G("You are an expert consultant. Provide a DETAILED, structured solution for: "+t+"\nInclude: analysis, step-by-step plan, specific advice, and actionable next steps. Be thorough (500+ words).");
            var el=document.getElementById('sO');el.textContent=out;el.classList.remove('hidden');
            document.getElementById('loadD').classList.add('hidden');document.getElementById('sB').disabled=false;
            saveH(t,out,'simple');
        }

        function MS1(){
            return '<div class="card"><div class="progress"><div class="pdot active"></div><div class="pdot"></div><div class="pdot"></div><div class="pdot"></div></div><div class="label-text"><span class="step-num">1</span> Describe Your Problem</div><textarea id="mg" class="input" placeholder="Be as detailed as possible... The more context, the better the AI analysis."></textarea><button onclick="MS2()" class="btn btn-pri mt1">AI Analysis →</button></div>';
        }
        function MS2(){
            flow.goal=document.getElementById('mg').value;if(!flow.goal)return;
            var h='<div class="card"><div class="progress"><div class="pdot done"></div><div class="pdot active"></div><div class="pdot"></div><div class="pdot"></div></div><div class="label-text"><span class="step-num">2</span> Category & Audience</div><p class="text2 mb1">Select best category:</p><div id="cats">';
            var cats=['Marketing','Content','Tech','Business','Creative','Education','Social','Personal'];
            for(var i=0;i<cats.length;i++){h+='<span class="badge" onclick="SC(\''+cats[i]+'\')">'+cats[i]+'</span>';}
            h+='</div><input id="ma" class="input mt2" placeholder="Target Audience? e.g., Working professionals 25-40"><button onclick="MS3()" class="btn btn-pri mt1">Next →</button></div>';
            document.getElementById('masterPanel').innerHTML=h;
        }
        function SC(c){flow.cat=c;var b=document.querySelectorAll('#cats .badge');for(var i=0;i<b.length;i++){b[i].classList.remove('sel');}event.target.classList.add('sel');}
        function MS3(){
            flow.aud=document.getElementById('ma').value;
            var h='<div class="card"><div class="progress"><div class="pdot done"></div><div class="pdot done"></div><div class="pdot active"></div><div class="pdot"></div></div><div class="label-text"><span class="step-num">3</span> Tone & Requirements</div><select id="mt" class="input"><option>Professional</option><option>Friendly</option><option>Inspirational</option><option>Formal</option></select><textarea id="me" class="input mt1" placeholder="Extra requirements? e.g., Include SWOT, 90-day plan..."></textarea><button onclick="MS4()" class="btn btn-gold mt1">✨ Generate Analysis</button></div>';
            document.getElementById('masterPanel').innerHTML=h;
        }
        async function MS4(){
            flow.tone=document.getElementById('mt').value;flow.extra=document.getElementById('me').value;
            document.getElementById('masterPanel').innerHTML='<div class="card center"><div class="spinner"></div><p class="text2">Analyzing deeply...</p></div>';
            reconfirmAnalysis=await G("Problem: \""+flow.goal+"\"\nCategory: "+(flow.cat||'General')+"\nAudience: "+(flow.aud||'General')+"\nTone: "+flow.tone+"\nRequirements: "+(flow.extra||'None')+"\n\nProvide a DEEP analysis (200+ words): What is the real problem? Root causes? Then ask: Is this analysis correct?");
            var h='<div class="card"><div class="progress"><div class="pdot done"></div><div class="pdot done"></div><div class="pdot done"></div><div class="pdot active"></div></div><div class="label-text"><span class="step-num">4</span> AI Analysis - Confirm?</div><div class="output-box">'+reconfirmAnalysis+'</div><p class="label-text mt2">Is this analysis correct?</p><div class="flex"><button onclick="RC(\'yes\')" class="btn btn-green">✅ Yes, Perfect</button><button onclick="RC(\'no\')" class="btn btn-red">❌ No, Fix It</button></div></div>';
            document.getElementById('masterPanel').innerHTML=h;
        }
        async function RC(ans){
            if(ans==='yes'){
                document.getElementById('masterPanel').innerHTML='<div class="card center"><div class="spinner"></div><p class="text2">Building Master Prompt...</p></div>';
                var o=await G("Create an EXPERT-LEVEL MASTER PROMPT for:\nProblem: \""+flow.goal+"\"\nCategory: "+(flow.cat||'General')+"\nAudience: "+(flow.aud||'General')+"\nTone: "+flow.tone+"\nAnalysis: \""+reconfirmAnalysis+"\"\n\nInclude: expert role, clear context, numbered deliverables, format requirements. Ready to paste into any AI tool.");
                var h='<div class="card"><div class="flex-btwn mb1"><span class="label-text">✅ Master Prompt Ready</span><span class="badge sel">Confirmed</span></div><div class="output-box" id="finalOutput">'+o+'</div><div class="flex mt2"><button onclick="CP()" class="btn btn-out">📋 Copy</button><button onclick="page=\'prompt\';reconfirmStep=0;R()" class="btn btn-pri">🔄 New Problem</button></div></div>';
                document.getElementById('masterPanel').innerHTML=h;saveH(flow.goal,o,'master');
            }else{
                document.getElementById('masterPanel').innerHTML='<div class="card"><div class="label-text">What was wrong?</div><textarea id="rcf" class="input" placeholder="e.g., Real problem is lead quality, not pricing..."></textarea><button onclick="RCR()" class="btn btn-pri mt1">Re-analyze</button></div>';
            }
        }
        async function RCR(){
            var f=document.getElementById('rcf').value;if(!f)return;reconfirmHistory.push(f);
            document.getElementById('masterPanel').innerHTML='<div class="card center"><div class="spinner"></div><p class="text2">Re-analyzing...</p></div>';
            reconfirmAnalysis=await G("Original: \""+flow.goal+"\"\nOld Analysis: \""+reconfirmAnalysis+"\"\nFeedback: \""+f+"\"\n\nProvide FRESH deep analysis incorporating all feedback.");
            document.getElementById('masterPanel').innerHTML='<div class="card"><div class="label-text"><span class="step-num">4</span> New Analysis - Correct?</div><div class="output-box">'+reconfirmAnalysis+'</div><div class="flex mt2"><button onclick="RC(\'yes\')" class="btn btn-green">✅ Yes!</button><button onclick="RC(\'no\')" class="btn btn-red">❌ Still No</button></div></div>';
        }

        function HistoryUI(){return '<h2 style="font-size:20px;font-weight:700;margin-bottom:14px;color:var(--black)">History</h2><div id="hl">Loading...</div>';}
        async function loadHistory(){
            if(!U)return;
            var s=await db.collection('prompts').where('userId','==',U.uid).orderBy('createdAt','desc').limit(30).get();
            var l=document.getElementById('hl');
            if(s.empty){l.innerHTML='<div class="card center"><p class="text2">No problems solved yet</p></div>';return;}
            var docs=s.docs;
            var h='';
            for(var i=0;i<docs.length;i++){
                var x=docs[i].data();
                h+='<div class="card"><div class="flex-btwn"><span class="badge" style="background:var(--black);color:#fff;border:none">'+(x.type||'simple')+'</span><span class="text2">'+new Date(x.createdAt).toLocaleDateString()+'</span></div><p class="mt1" style="font-size:14px">'+(x.prompt||'').substring(0,100)+'...</p></div>';
            }
            l.innerHTML=h;
        }
        async function saveH(p,o,t){
            if(!U)return;
            await db.collection('prompts').add({userId:U.uid,prompt:p,output:o,type:t,createdAt:new Date().toISOString()});
            var userRef=db.collection('users').doc(U.uid);
            var doc=await userRef.get();
            if(doc.exists){
                var current=doc.data().promptsUsed||0;
                await userRef.update({promptsUsed:current+1});
            }
        }

        function ProfileUI(){
            var h='<h2 style="font-size:20px;font-weight:700;margin-bottom:14px;color:var(--black)">Profile</h2>';
            h+='<div class="card"><p class="text2">Name</p><p style="font-weight:700;font-size:16px">'+(U.displayName||'N/A')+'</p></div>';
            h+='<div class="card"><p class="text2">Email</p><p style="font-weight:700;font-size:16px">'+U.email+'</p></div>';
            h+='<div class="card"><p class="text2">Plan</p><p style="font-weight:700;font-size:16px;color:var(--gold)">Free Forever</p></div>';
            h+='<button onclick="auth.signOut()" class="btn btn-red mt2">Sign Out</button>';
            return h;
        }

        async function G(p){
            try{
                var r=await fetch('https://api.groq.com/openai/v1/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+GK},body:JSON.stringify({model:GM,messages:[{role:'user',content:p}],temperature:0.8,max_tokens:4000})});
                var d=await r.json();
                if(d.error)return 'Error: '+d.error.message;
                return d.choices?.[0]?.message?.content||'No response';
            }catch(e){return 'Network Error: '+e.message;}
        }

        function CP(){
            var t=document.getElementById('finalOutput')?.textContent||document.querySelector('.output-box')?.textContent||'';
            navigator.clipboard.writeText(t).then(function(){var x=document.createElement('div');x.className='toast';x.textContent='Copied! ✅';document.body.appendChild(x);setTimeout(function(){x.remove();},2000);});
        }

        function SP(p){
            page=p;
            var navItems=document.querySelectorAll('.nav-i');
            for(var i=0;i<navItems.length;i++){navItems[i].classList.remove('active');}
            var el=document.querySelector('[data-p="'+p+'"]');
            if(el)el.classList.add('active');
            R();
        }

        auth.onAuthStateChanged(async function(u){
            U=u;
            if(u){
                var d=await db.collection('users').doc(u.uid).get();
                if(d.exists){
                    var du=d.data();
